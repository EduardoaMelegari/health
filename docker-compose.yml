services:
  dieta-app:
    build: .
    container_name: dieta-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=America/Sao_Paulo
      # Coach por chat (Claude API). Defina ANTHROPIC_API_KEY no ambiente ou num .env
      # ao lado deste compose. Sem a chave, o app funciona e a aba Coach fica inativa.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-5}
